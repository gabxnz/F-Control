<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-300">

    <header class="sticky top-0 z-20 bg-slate-900/80 backdrop-blur-sm shadow-md border-b border-slate-700">
        <div class="container mx-auto max-w-4xl p-4 flex items-center justify-between">
            <button aria-label="Abrir menu" id="openMenuBtn" class="p-2 rounded-full hover:bg-slate-700 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu text-slate-200"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
            </button>
            <h1 class="text-xl font-bold text-slate-200">Meu Dinheiro</h1>
            <div class="w-10"></div> </div>
    </header>
    
    <div class="container mx-auto max-w-4xl p-4">

        <div class="main-header-card text-white p-6 rounded-3xl shadow-lg mb-8">
            <div class="text-left">
                <h1 class="text-lg font-semibold opacity-80">Saldo Geral</h1>
                <p id="balance" class="text-4xl font-bold mt-1">R$ 0,00</p>
            </div>
        </div>

        <main>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

                <div class="bg-slate-800 p-5 rounded-2xl shadow-lg flex flex-col border border-slate-700">
                    <div class="flex items-center gap-3 mb-4">
                         <div class="bg-cyan-500/10 p-2 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stroke-cyan-400 lucide lucide-trending-up"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                        </div>
                        <h2 class="text-xl font-bold text-cyan-400">Ganhos</h2>
                        <p id="total-earnings" class="ml-auto text-lg font-semibold text-cyan-400">R$ 0,00</p>
                    </div>
                    <form id="earnings-form" class="space-y-3 mb-4">
                        <div class="flex gap-2">
                             <input type="number" id="earning-amount-input" placeholder="Valor" step="0.01" class="flex-1 min-w-0 p-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition text-white" required>
                             <button type="submit" class="bg-cyan-500 text-white font-semibold px-4 py-2 rounded-lg hover:bg-cyan-600 transition-colors shadow">Adicionar</button>
                        </div>
                        <input type="text" id="earning-text-input" placeholder="Descrição" class="w-full p-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition text-white">
                    </form>
                    <div class="border-t pt-4 mt-auto border-slate-700">
                        <button id="viewEarningsHistoryBtn" class="w-full bg-slate-700 text-slate-200 font-semibold py-2 rounded-lg hover:bg-slate-600 transition-colors">Ver Histórico</button>
                    </div>
                </div>

                <div class="bg-slate-800 p-5 rounded-2xl shadow-lg flex flex-col border border-slate-700">
                     <div class="flex items-center gap-3 mb-4">
                         <div class="bg-purple-500/10 p-2 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stroke-purple-400 lucide lucide-trending-down"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>
                        </div>
                        <h2 class="text-xl font-bold text-purple-400">Gastos</h2>
                        <p id="total-expenses" class="ml-auto text-lg font-semibold text-purple-400">R$ 0,00</p>
                    </div>
                    <form id="expenses-form" class="space-y-3 mb-4">
                         <div class="flex gap-2">
                            <input type="number" id="expense-amount-input" placeholder="Valor" step="0.01" class="flex-1 min-w-0 p-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-purple-400 transition text-white" required>
                            <button type="submit" class="bg-purple-500 text-white font-semibold px-4 py-2 rounded-lg hover:bg-purple-600 transition-colors shadow">Adicionar</button>
                        </div>
                        <input type="text" id="expense-text-input" placeholder="Descrição" class="w-full p-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-purple-400 transition text-white">
                    </form>
                    <div class="border-t pt-4 mt-auto border-slate-700">
                        <button id="viewExpensesHistoryBtn" class="w-full bg-slate-700 text-slate-200 font-semibold py-2 rounded-lg hover:bg-slate-600 transition-colors">Ver Histórico</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="menuOverlay" class="overlay fixed inset-0 bg-black bg-opacity-50 hidden z-40 opacity-0"></div>
    <div id="sideMenu" class="side-menu fixed top-0 left-0 h-full w-72 bg-slate-800 shadow-lg transform -translate-x-full z-50 border-r border-slate-700">
        <div class="flex justify-between items-center p-4 border-b border-slate-700">
            <h3 class="font-bold text-lg">Menu</h3>
            <button id="closeMenuBtn" class="text-slate-400 hover:text-slate-200 text-2xl">&times;</button>
        </div>
        <nav>
            <ul>
                <li>
                    <button id="menuCaixinhaBtn" class="flex items-center gap-4 w-full p-4 text-left hover:bg-slate-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-archive text-slate-400"><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>
                        <span class="font-semibold">Caixinha</span>
                    </button>
                </li>
            </ul>
        </nav>
    </div>

    <div id="caixinhaModal" class="modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4 opacity-0">
        <div class="modal-content bg-slate-800 p-6 rounded-xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 border border-slate-700">
            <div class="text-center mb-4">
                <h3 class="text-lg font-bold">Saldo da Caixinha</h3>
                <p id="caixinhaModalBalance" class="text-3xl font-bold text-indigo-400 mt-1">R$ 0,00</p>
            </div>
            <p class="text-sm text-slate-400 mb-2 text-center">Digite o valor para a operação</p>
            <input type="number" id="caixinhaModalInput" step="0.01" class="w-full p-3 text-center bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition mb-4" placeholder="0.00">
            <div class="flex justify-center gap-3">
                <button id="caixinhaRemoveBtn" class="flex-1 bg-rose-500 text-white font-semibold px-4 py-2 rounded-lg hover:bg-rose-600 transition-colors">Remover</button>
                <button id="caixinhaAddBtn" class="flex-1 bg-emerald-500 text-white font-semibold px-4 py-2 rounded-lg hover:bg-emerald-600 transition-colors">Adicionar</button>
            </div>
             <button id="viewCaixinhaHistoryBtn" class="w-full mt-2 bg-slate-700 text-slate-200 font-semibold py-2 rounded-lg hover:bg-slate-600 transition-colors">Ver Histórico</button>
             <button id="closeCaixinhaBtn" class="w-full mt-4 bg-slate-600 text-slate-200 font-semibold py-2 rounded-lg hover:bg-slate-500 transition-colors">Fechar</button>
        </div>
    </div>

    <div id="historyModal" class="modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4 opacity-0">
        <div class="modal-content bg-slate-800 p-6 rounded-xl shadow-2xl w-full max-w-md flex flex-col transform scale-95 opacity-0 max-h-[80vh] border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h3 id="historyModalTitle" class="text-lg font-bold">Histórico</h3>
                <button id="closeHistoryBtn" class="text-slate-400 hover:text-slate-200">&times;</button>
            </div>
            <div class="flex-grow overflow-y-auto custom-scrollbar pr-2">
                <ul id="historyModalList" class="space-y-2"></ul>
            </div>
        </div>
    </div>
    
    <div id="editModal" class="modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4 opacity-0">
        <div class="modal-content bg-slate-800 p-6 rounded-xl shadow-2xl w-full max-w-sm transform scale-95 opacity-0 border border-slate-700">
            <h3 class="text-lg font-bold mb-4">Editar Transação</h3>
            <div class="space-y-4">
                <input type="number" id="editAmountInput" placeholder="Valor" step="0.01" class="w-full p-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" required>
                <input type="text" id="editTextIn" placeholder="Descrição" class="w-full p-2 bg-slate-700 border border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button id="cancelEditBtn" class="bg-slate-600 text-slate-200 font-semibold px-4 py-2 rounded-lg hover:bg-slate-500 transition-colors">Cancelar</button>
                <button id="saveEditBtn" class="bg-indigo-600 text-white font-semibold px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors">Salvar</button>
            </div>
        </div>
    </div>

    <div id="confirmDeleteModal" class="modal fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center hidden z-50 p-4 opacity-0">
        <div class="modal-content bg-slate-800 p-6 rounded-xl shadow-2xl w-full max-w-xs text-center transform scale-95 opacity-0 border border-slate-700">
            <h3 class="text-lg font-bold mb-2">Confirmar Exclusão</h3>
            <p class="text-sm text-slate-400 mb-6">Você tem certeza que deseja apagar este item?</p>
            <div class="flex justify-center gap-3">
                <button id="cancelDeleteBtn" class="flex-1 bg-slate-600 text-slate-200 font-semibold px-4 py-2 rounded-lg hover:bg-slate-500 transition-colors">Cancelar</button>
                <button id="confirmDeleteBtn" class="flex-1 bg-red-500 text-white font-semibold px-4 py-2 rounded-lg hover:bg-red-600 transition-colors">Apagar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
